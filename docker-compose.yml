services:
  postgres:
    image: postgres:15
    environment: 
      POSTGRES_DB: codeplus
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alphine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file: ./backend/.env

  froned:
    build: ./frontend
    ports: 
      - "3000:3000"
    depends_on: 
      - backend